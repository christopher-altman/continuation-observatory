name: Deploy Live Observatory

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: live-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run test suite
        run: python -m pytest tests/ -x

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT }}
      DEPLOY_APP_DIR: ${{ vars.DEPLOY_APP_DIR }}
      DEPLOY_ENV_FILE: ${{ vars.DEPLOY_ENV_FILE }}
      DEPLOY_API_SERVICE: ${{ vars.DEPLOY_API_SERVICE }}
      DEPLOY_SCHEDULER_SERVICE: ${{ vars.DEPLOY_SCHEDULER_SERVICE }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_SSH_PORT:-22}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Upload deploy script
        run: |
          scp -P "${DEPLOY_SSH_PORT:-22}" deploy/remote_update.sh "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/continuation-observatory-remote-update.sh"

      - name: Run remote deploy
        run: |
          ssh -p "${DEPLOY_SSH_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "chmod +x /tmp/continuation-observatory-remote-update.sh && \
             APP_DIR='${DEPLOY_APP_DIR:-/opt/continuation-observatory/app}' \
             ENV_FILE='${DEPLOY_ENV_FILE:-/opt/continuation-observatory/app/.env}' \
             API_SERVICE='${DEPLOY_API_SERVICE:-continuation-observatory-web}' \
             SCHEDULER_SERVICE='${DEPLOY_SCHEDULER_SERVICE:-continuation-observatory-scheduler}' \
             BRANCH='${{ github.ref_name }}' \
             /tmp/continuation-observatory-remote-update.sh"
