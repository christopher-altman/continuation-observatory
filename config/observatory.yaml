runtime:
  expand_configured_models: true
  hot_reload: true
  include_disabled_models_in_api: true
  probe_cycle_hours: 6
constellation:
  similarity_window_days: 7
  edge_threshold: 0.60
  webgl_fallback_threshold: 20
public_feed:
  active_window_hours: 6
  quiet_window_hours: 24
  stale_after_hours: 72
  burst_window_minutes: 90
  recent_raw_limit: 500
  max_items: 10
  fallback_max_items: 4
  observatory_scope_min_providers: 2
  observatory_scope_min_models: 3
  provider_scope_min_models: 2
  suppressed_error_families:
    - ResourceExhausted
  suppressed_event_patterns:
    - quota exhausted
    - quota exceeded
    - low balance
    - insufficient balance
    - credit exhausted
  resolved_payment_residue_patterns:
    - quota exhausted
    - quota exceeded
    - exceeded your current quota
    - insufficient quota
    - low balance
    - insufficient balance
    - credit exhausted
    - billing details
    - check your plan
    - payment
    - billing
providers:
  anthropic:
    enabled: true
  openai:
    enabled: true
  gemini:
    enabled: true
  hf-local:
    enabled: true
  openai-compatible:
    openai-gpt-oss-20b:
      provider_name: together
      base_url: https://api.together.xyz/v1
      api_key_env: TOGETHER_API_KEY
      enabled: true
    openai-gpt-oss-120b:
      provider_name: together
      base_url: https://api.together.xyz/v1
      api_key_env: TOGETHER_API_KEY
